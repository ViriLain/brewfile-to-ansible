repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - fix
          - feat
          - docs
          - test
          - chore
          - refactor
          - ci
          - perf
          - build
          - style
